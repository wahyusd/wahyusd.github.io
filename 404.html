<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 — Page Not Found | Wahyusd</title>
    <link rel="icon" type="image/png" href="/assets/images/profile-photo.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html { font-size: 62.5%; }
        body {
            background: #0d0d11;
            color: #e8e8f0;
            font-family: 'Inter', sans-serif;
            font-size: 1.6rem;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            padding: 2rem;
        }
        #shapes-container {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
        }
        .shape {
            position: absolute;
            opacity: 0.15;
        }
        .shape-diamond {
            width: 3rem;
            height: 3rem;
            transform: rotate(45deg);
            border: 2px solid;
        }
        .shape-circle {
            width: 2.5rem;
            height: 2.5rem;
            border-radius: 50%;
            border: 2px solid;
        }
        .shape-ring {
            width: 4rem;
            height: 4rem;
            border-radius: 50%;
            border: 2px solid;
        }
        .shape-dot {
            width: 0.8rem;
            height: 0.8rem;
            border-radius: 50%;
        }
        .content {
            position: relative;
            z-index: 1;
            text-align: center;
            max-width: 50rem;
        }
        .code-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1.5rem;
            margin-bottom: 1rem;
        }
        .code-digit {
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: 14rem;
            font-weight: 800;
            line-height: 1;
            background: linear-gradient(135deg, #fb923c, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            opacity: 0;
        }
        .code-divider {
            width: 0.6rem;
            height: 6rem;
            background: linear-gradient(to bottom, #fb923c, #c084fc);
            border-radius: 3px;
            opacity: 0;
        }
        h1 {
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: 2.4rem;
            font-weight: 600;
            margin-bottom: 0.8rem;
            opacity: 0;
        }
        p {
            color: #8b8ba8;
            font-size: 1.6rem;
            margin-bottom: 3rem;
            opacity: 0;
        }
        .btn-group {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1.2rem;
            flex-wrap: wrap;
            opacity: 0;
        }
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 0.8rem;
            padding: 1.2rem 2.8rem;
            background: linear-gradient(135deg, #c084fc, #a855f7);
            color: #fff;
            border-radius: 8px;
            font-size: 1.5rem;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.2s ease;
            border: none;
            cursor: pointer;
        }
        .btn-outline {
            background: transparent;
            border: 1px solid var(--border-color, #2a2a35);
            color: #e8e8f0;
        }
        .btn-outline:hover {
            border-color: #c084fc;
            color: #c084fc;
        }
        .btn:hover {
            transform: translateY(-2px);
        }
        .links {
            margin-top: 3rem;
            display: flex;
            gap: 2rem;
            justify-content: center;
            font-size: 1.4rem;
            opacity: 0;
        }
        .links a {
            color: #55556e;
            text-decoration: none;
            transition: color 0.2s ease;
            position: relative;
        }
        .links a::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            width: 0;
            height: 1px;
            background: #c084fc;
            transition: width 0.3s ease;
        }
        .links a:hover { color: #c084fc; }
        .links a:hover::after { width: 100%; }

        @media (max-width: 600px) {
            .code-digit { font-size: 8rem; }
            .code-divider { height: 4rem; }
            .code-row { gap: 0.8rem; }
            h1 { font-size: 2rem; }
            p { font-size: 1.4rem; }
            .links { flex-direction: column; gap: 1rem; }
            .btn-group { flex-direction: column; }
        }
    </style>
</head>
<body>
    <div id="shapes-container"></div>

    <div class="content">
        <div class="code-row">
            <span class="code-digit" id="d1">4</span>
            <span class="code-divider" id="div"></span>
            <span class="code-digit" id="d2">0</span>
            <span class="code-divider" id="div2"></span>
            <span class="code-digit" id="d3">4</span>
        </div>
        <h1 id="title">Page Not Found</h1>
        <p id="desc">The page you're looking for doesn't exist or has been moved.</p>
        <div class="btn-group" id="btns">
            <a href="/index.html" class="btn"><i class="fas fa-arrow-left"></i> Back to Home</a>
            <a href="javascript:history.back()" class="btn btn-outline"><i class="fas fa-undo"></i> Go Back</a>
        </div>
        <div class="links" id="links">
            <a href="/pages/projects/">Projects</a>
            <a href="/pages/learning/">Learning</a>
            <a href="https://mail.google.com/mail/?view=cm&to=dianwahyusap@gmail.com" target="_blank">Contact</a>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.2/anime.min.js"></script>
    <script>
    (function() {
        const colors = ['#c084fc', '#fb923c', '#a855f7', '#f97316', '#9333ea', '#e8793c'];
        const container = document.getElementById('shapes-container');

        for (let i = 0; i < 20; i++) {
            const el = document.createElement('div');
            const type = ['diamond', 'circle', 'ring', 'dot'][Math.floor(Math.random() * 4)];
            el.className = 'shape shape-' + type;
            el.style.left = Math.random() * 100 + '%';
            el.style.top = Math.random() * 100 + '%';
            const color = colors[Math.floor(Math.random() * colors.length)];
            if (type === 'dot') {
                el.style.background = color;
            } else {
                el.style.borderColor = color;
            }
            el.style.opacity = 0.08 + Math.random() * 0.15;
            container.appendChild(el);
        }

        anime({
            targets: '.shape',
            translateX: function() { return anime.random(-120, 120); },
            translateY: function() { return anime.random(-120, 120); },
            rotate: function() { return anime.random(-180, 180); },
            scale: function() { return [1, anime.random(8, 15) / 10]; },
            duration: function() { return anime.random(4000, 8000); },
            delay: function() { return anime.random(0, 3000); },
            direction: 'alternate',
            loop: true,
            easing: 'easeInOutQuad'
        });

        const tl = anime.timeline({ easing: 'easeOutElastic(1, 0.6)' });

        tl.add({
            targets: '.code-digit',
            opacity: [0, 1],
            translateY: [60, 0],
            duration: 1000,
            delay: anime.stagger(200)
        })
        .add({
            targets: '.code-divider',
            opacity: [0, 1],
            scaleY: [0, 1],
            duration: 600,
            easing: 'easeOutCubic'
        }, '-=600')
        .add({
            targets: '#title',
            opacity: [0, 1],
            translateY: [30, 0],
            duration: 600,
            easing: 'easeOutCubic'
        }, '-=300')
        .add({
            targets: '#desc',
            opacity: [0, 1],
            translateY: [20, 0],
            duration: 500
        }, '-=200')
        .add({
            targets: '#btns',
            opacity: [0, 1],
            translateY: [20, 0],
            duration: 400
        }, '-=200')
        .add({
            targets: '#links',
            opacity: [0, 1],
            translateY: [15, 0],
            duration: 400
        }, '-=200');
    })();
    </script>
</body>
</html>
